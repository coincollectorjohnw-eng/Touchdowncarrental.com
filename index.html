<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <!-- MOBILE RESPONSIVE -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Touchdown Car Rental</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{

      width:100%;
      height:100%;
      overflow:hidden;

      background:#000;

      font-family:Arial, sans-serif;

    }

    .app-container{

      position:fixed;

      top:0;
      left:0;

      width:100vw;
      height:100vh;

      overflow:hidden;

    }

    iframe{

      width:100%;
      height:100%;

      border:none;

      display:block;

      background:#111;

    }

    /* =========================
       LOADING SCREEN
    ========================== */

    .loader-wrapper{

      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:100%;

      background:#000;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      z-index:10000;

      transition:opacity 0.4s ease,
                 visibility 0.4s ease;

    }

    .loader-wrapper.hidden{

      opacity:0;
      visibility:hidden;

      pointer-events:none;

    }

    .spinner{

      width:70px;
      height:70px;

      border:6px solid rgba(255,255,255,0.2);

      border-top:6px solid #6c3cff;

      border-radius:50%;

      animation:spin 1s linear infinite;

      margin-bottom:20px;

    }

    .loading-text{

      color:white;

      font-size:18px;
      font-weight:bold;

      letter-spacing:1px;

    }

    @keyframes spin{

      0%{
        transform:rotate(0deg);
      }

      100%{
        transform:rotate(360deg);
      }

    }

    /* =========================
       MOBILE OPTIMIZATION
    ========================== */

    @media (max-width:768px){
      
      .spinner{

        width:55px;
        height:55px;

      }

      .loading-text{

        font-size:15px;

      }

    }

  </style>

</head>

<body>

  <!-- LOADING SCREEN -->

  <div class="loader-wrapper" id="loader">

    <div class="spinner"></div>

    <div class="loading-text">
      Loading Touchdown Car Rental...
    </div>

  </div>

  <!-- APP CONTAINER -->

  <div class="app-container">

    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbxm9AIEZv9vrE9XaRkX04sDLerUEdZ1w0Ba7VzeqSTtDhFzYCiw0FCfOaVP35Hd-xAW/exec"
      allowfullscreen>
    </iframe>

  </div>

  <script>

    // =========================
// AUTO FULLSCREEN (MOBILE SAFE)
// =========================

const container = document.querySelector('.app-container');

function goFullscreen() {
  try {
    if (container.requestFullscreen) {
      container.requestFullscreen();
    } else if (container.webkitRequestFullscreen) {
      container.webkitRequestFullscreen();
    } else if (container.msRequestFullscreen) {
      container.msRequestFullscreen();
    }
  } catch (err) {
    console.log("Fullscreen not allowed yet:", err);
  }
}

// Try immediately (may be blocked — that's OK)
if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
  goFullscreen();
}

// If blocked, trigger on first user interaction
let activated = false;

function activateFullscreenOnce() {
  if (activated) return;
  activated = true;
  goFullscreen();

  document.removeEventListener('touchstart', activateFullscreenOnce);
  document.removeEventListener('click', activateFullscreenOnce);
}

document.addEventListener('touchstart', activateFullscreenOnce, { passive: true });
document.addEventListener('click', activateFullscreenOnce);
    
    // =========================
    // LOADING SCREEN
    // =========================

    const iframe =
      document.getElementById('appFrame');

    const loader =
      document.getElementById('loader');

    iframe.onload = () => {

      setTimeout(() => {

        loader.classList.add('hidden');

      }, 500);

    };

    // =========================
    // MOBILE HEIGHT FIX
    // =========================

    function setViewportHeight(){

      document.documentElement.style.setProperty(
        '--vh',
        `${window.innerHeight * 0.01}px`
      );

    }

    setViewportHeight();

    window.addEventListener(
      'resize',
      setViewportHeight
    );

  </script>

</body>
</html>
